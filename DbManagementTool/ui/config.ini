# ================================================================
# Database Management Tool - Configuration File
# ================================================================
# This file contains environment variables, paths, credentials,
# and project-level configurations.
#
# SECURITY NOTE: This file may contain sensitive information.
# DO NOT commit to version control if it contains credentials.
# ================================================================

[paths]
# Configuration directory (uses ~ for home directory)
config_dir = ~/.dbmanager
# Configuration file names
saved_connections_file = saved_connections.json
saved_monitor_connections_file = saved_monitor_connections.json
# Encryption key files
db_key_file = .db_key
monitor_key_file = .monitor_key
# Oracle Instant Client path (can be overridden by ORACLE_HOME environment variable)
oracle_client_path = /Users/dhananjay.chaturvedi/Documents/Tools_Installation/Oracle/Instant_Client/19/instantclient_19_8

[database.ports]
# Default database ports
oracle = 1521
mysql = 3306
mariadb = 3306
postgresql = 5432
sqlite = 0

[database.connection]
# Connection timeout (seconds)
connection_timeout = 30.0
# Query execution timeout (seconds, 0 = no timeout)
query_timeout = 0
# Default autocommit mode
default_autocommit = true
# Connection retry attempts
max_connection_attempts = 8

[database.performance]
# Batch size for data transfer operations
transfer_batch_size = 1000
# Minimum rows for progress estimation
batch_min_rows = 10
# Maximum VARCHAR size
varchar_max_limit = 4000
# Minimum VARCHAR size
varchar_min_limit = 255
# VARCHAR buffer (additional bytes)
varchar_buffer = 50
# Use buffered cursors for MySQL/MariaDB
use_buffered_cursor = true

[ai.claude_cli]
# Claude CLI timeout for version check (seconds)
cli_test_timeout = 5
# Default timeout for AI queries (seconds)
default_timeout = 120
# Timeout for simple queries (seconds)
simple_query_timeout = 120
# Timeout for complex queries (seconds)
complex_query_timeout = 180
# Timeout for follow-up queries (seconds)
followup_timeout = 180
# Maximum output tokens per request
max_output_tokens = 4000

[ai.cache]
# Maximum number of tables to fetch for schema info
max_tables_fetch = 50
# Maximum tables for detailed schema
max_tables_detailed = 10
# Maximum tables to display in context
max_tables_display = 100
# Maximum constraints to display
max_constraints_display = 50
# Maximum indexes to display
max_indexes_display = 50
# Top N tables to show
top_tables_count = 15
# Maximum users/roles to display
max_users_roles_display = 15

[ssh.connection]
# SSH connection timeout (seconds)
ssh_timeout = 30
# SSH test command timeout (seconds)
ssh_test_timeout = 5
# SSH ControlPersist duration (seconds)
ssh_control_persist = 600
# SSH OS detection timeout (seconds)
ssh_os_detection_timeout = 15
# SSH monitoring data collection timeout (seconds)
ssh_monitoring_timeout = 30

[monitoring]
# Monitoring metrics refresh interval (milliseconds)
metrics_refresh_interval = 5000
# Maximum data points to keep in graphs
max_graph_data_points = 60

[security]
# File permissions for encryption keys (octal)
key_file_permissions = 0o600
# File permissions for config files (octal)
config_file_permissions = 0o600

[encoding]
# List of encoding attempts (comma-separated)
encoding_attempts = utf-8,windows-1252,iso-8859-1,latin1

[project]
# Application timezone (leave empty for system default)
timezone =
# Enable debug logging
debug_mode = false
# Application name
app_name = Database Manager - Multi-DB Tool
