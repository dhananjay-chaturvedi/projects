# Build and deploy the DbAssistant documentation site (Astro Starlight) to GitHub Pages.
#
# One-time setup: Repository Settings → Pages → Source = GitHub Actions.
#
# Monorepo layout: site source lives at DbAssistant/website/.
# If DbAssistant is the repository root, change working-directory to "website"
# and path filters to "website/**".

name: Deploy documentation site

on:
  push:
    branches: [main]
    paths:
      - "DbAssistant/website/**"
      - ".github/workflows/website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DbAssistant/website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: DbAssistant/website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: DbAssistant/website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
