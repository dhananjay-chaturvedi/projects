<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(80,140)">
    <text x="0" y="0" font-family="-apple-system, system-ui, sans-serif" font-weight="800" font-size="86" fill="white">DbAssistant</text>
    <text x="0" y="90" font-family="-apple-system, system-ui, sans-serif" font-weight="500" font-size="36" fill="#BBDEFB">
      Production-grade DB management  UI · CLI · REST API
    </text>
    <text x="0" y="220" font-family="JetBrains Mono, monospace" font-size="22" fill="#E3F2FD">$ dbtool ai --conn prod "top 5 customers by revenue"</text>
    <text x="0" y="262" font-family="JetBrains Mono, monospace" font-size="22" fill="#E3F2FD">$ curl http://localhost:8000/api/metrics/prod</text>
    <text x="0" y="304" font-family="JetBrains Mono, monospace" font-size="22" fill="#E3F2FD">$ dbtool monitor --conn prod --interval 30</text>
  </g>
  <g transform="translate(80,520)">
    <text x="0" y="0" font-family="-apple-system, system-ui, sans-serif" font-weight="600" font-size="22" fill="#BBDEFB" letter-spacing="0.15em">
      MULTI-DB · MULTI-CLOUD · OFFLINE-INSTALLABLE
    </text>
  </g>
</svg>
