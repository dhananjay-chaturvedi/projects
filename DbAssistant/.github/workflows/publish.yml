# Publish dbassistant to PyPI when a GitHub Release is published.
#
# One-time setup: https://pypi.org/manage/account/publishing/
# Add a trusted publisher for this repository + this workflow file.

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install -U pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
