name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (core + API)
        run: |
          python -m pip install -U pip
          pip install -e ".[api]"

      - name: Verify module layout and imports
        run: python setup/install.py --verify-only --module full --skip-venv

      - name: Smoke test CLI
        run: |
          python dbtool.py --help
          python dbtool.py modules

      - name: Smoke test API import
        run: python -c "from app.headless.api import app; assert app is not None"

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build documentation site
        run: npm run build
